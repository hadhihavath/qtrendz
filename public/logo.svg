<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8D1B3D" />
      <stop offset="100%" stop-color="#5B0612" />
    </linearGradient>
  </defs>
  <!-- Logo Icon: Stylized Q with Gold Trend Line Arrow -->
  <g transform="translate(10, 15)">
    <!-- Outer Q Circle -->
    <path d="M 60,25 A 40,40 0 1, 0 92,90 L 105,105" fill="none" stroke="url(#logoGrad)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Overlapping gold arrow representing trending items -->
    <path d="M 45,45 L 75,75 M 75,75 L 65,75 M 75,75 L 75,65" fill="none" stroke="#E6C229" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="92" cy="90" r="5" fill="#E6C229" />
  </g>
  <!-- Logo Text -->
  <text x="145" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="54" font-weight="900" letter-spacing="-0.04em" fill="#111111">
    Q<tspan fill="url(#logoGrad)">TRENDZ</tspan>
  </text>
  <text x="148" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="0.45em" fill="#8D1B3D" text-transform="uppercase">
    By destination
  </text>
</svg>
